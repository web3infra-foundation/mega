name: Orion server deploy
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/orion-server-deploy.yml"
      - "orion-server/**"

env:
  REGISTRY_ALIAS: m8q5m4u3
  REPOSITORY: mega/orion-server
  IMAGE_TAG_BASE: latest

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-single-arch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # AWS auth
      # -----------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # -----------------------------
      # Build & push to AWS
      # -----------------------------
      - name: Build & push amd64 image to AWS
        env:
          AWS_REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
        run: |
          set -euo pipefail

          PLATFORM="linux/amd64"
          ARCH_SUFFIX="amd64"

          AWS_IMAGE_BASE="$AWS_REGISTRY/${{ env.REGISTRY_ALIAS }}/${{ env.REPOSITORY }}"

          TAG="${{ env.IMAGE_TAG_BASE }}-$ARCH_SUFFIX"
          CACHE_SCOPE="orion-server-$ARCH_SUFFIX"

          docker buildx build \
            --platform "$PLATFORM" \
            --cache-from type=gha,scope=$CACHE_SCOPE \
            --cache-to type=gha,mode=max,scope=$CACHE_SCOPE \
            --provenance=false \
            --sbom=false \
            -f orion-server/Dockerfile \
            -t "$AWS_IMAGE_BASE:$TAG" \
            --push .

  manifest:
    needs: build-push-single-arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Create & push manifest
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_BASE="$REGISTRY/${{ env.REGISTRY_ALIAS }}/${{ env.REPOSITORY }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # latest manifest
          docker manifest create "$IMAGE_BASE:${{ env.IMAGE_TAG_BASE }}" \
            "$IMAGE_BASE:${{ env.IMAGE_TAG_BASE }}-amd64" \
            "$IMAGE_BASE:${{ env.IMAGE_TAG_BASE }}-arm64"
          docker manifest push "$IMAGE_BASE:${{ env.IMAGE_TAG_BASE }}"

          # commit-hash manifest (same digests as latest for this commit)
          docker manifest create "$IMAGE_BASE:$SHORT_SHA" \
            "$IMAGE_BASE:${{ env.IMAGE_TAG_BASE }}-amd64" \
            "$IMAGE_BASE:${{ env.IMAGE_TAG_BASE }}-arm64"
          docker manifest push "$IMAGE_BASE:$SHORT_SHA"

  deploy-aws:
    needs: manifest
    if: ${{ github.repository == 'gitmono-dev/mega' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - cluster: gitmega-com
            service: orion-server-dev-service-om0caign
          - cluster: gitmono-com-mega-app
            service: orion-server-service
    steps:
      - name: Force ECS redeploy
        run: |
          aws ecs update-service \
            --cluster ${{ matrix.cluster }} \
            --service ${{ matrix.service }} \
            --force-new-deployment
        env:
          AWS_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
