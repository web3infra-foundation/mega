[package]
name = "orion"
version = "0.1.2"
edition = "2024"

[[bin]]
name = "orion"
path = "src/main.rs"


[dependencies]
api-model = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "fs", "process"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
serde = { workspace = true, features = ["derive", "rc"] }
futures-util = { workspace = true }
once_cell = { workspace = true }
dotenvy = { workspace = true }
tokio-tungstenite = { workspace = true, features = ["native-tls"] }
tungstenite = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
anyhow = { workspace = true }
itertools = { workspace = true }
parse-display = "0.11.0"
audit = { path = "./audit" }
td_util = { path = "./td_util" }
td_util_buck = { path = "./buck" }
common = { path = "../common" }
tokio-util = { workspace = true }

[dev-dependencies]
serial_test = { workspace = true }
tempfile = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
scorpiofs = { git = "https://github.com/web3infra-foundation/scorpiofs.git", branch = "codex/antares-fuse-local-libfuse" }
